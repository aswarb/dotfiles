[font]
size = 10.5
offset = { x = 0, y = 0 } 

[font.normal]
#family = "JetBrainsMono NF"
family = "BlexMono Nerd Font Medium"
#family = "Iosevka Nerd Font Mono"
style = "Regular"

[window]
decorations = "None"
opacity = 0.6
padding = { x = 8, y = 8 }
dynamic_padding = true

[terminal]
osc52 = "CopyPaste"

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
]

[general]
#import = ["./themes/themes/vesper.toml"]
import = ["./perigee_dark.toml"]
#import = ["./cynosure_dark.toml"]
#import = ["./themes/themes/kanagawa_dragon.toml"]
#import = ["./themes/themes/nord.toml"]
