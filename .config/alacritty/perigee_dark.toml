# cyberpunk rice — alacritty colors
# derived from the kanagawa_cyberpunk palette:
#   bg #0f1216 / primary #f4f5f8 / secondary #c4c7ce / tertiary #9aa0ad
#   muted #888d99 / comment #4f535e
#   amber #edc99a (primitives)  coral #e07860 (control flow)
#   cherry #c85a5a (errors)     cyan #8ad0d4 (functions)

[colors.primary]
background = '#0f1216'
foreground = '#f4f5f8'

[colors.cursor]
cursor = '#8ad0d4'
text   = '#0f1216'

[colors.vi_mode_cursor]
cursor = '#edc99a'
text   = '#0f1216'

[colors.selection]
background = '#232629'
text       = '#f4f5f8'

[colors.search.matches]
background = '#232629'
foreground = '#8ad0d4'

[colors.search.focused_match]
background = '#8ad0d4'
foreground = '#0f1216'

[colors.normal]
black   = '#0a0c0f'
red     = '#e07860'
green   = '#888d99'
yellow  = '#edc99a'
blue    = '#8ad0d4'
magenta = '#9aa0ad'
cyan    = '#8ad0d4'
white   = '#c4c7ce'

[colors.bright]
black   = '#4f535e'
red     = '#c85a5a'
green   = '#c4c7ce'
yellow  = '#f4f5f8'
blue    = '#8ad0d4'
magenta = '#c4c7ce'
cyan    = '#c4c7ce'
white   = '#f4f5f8'
